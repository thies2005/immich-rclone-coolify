name: immich

# IMPORTANT: rclone must be installed on the host BEFORE deploying this stack.
# Run: sudo bash install.sh  (from this repo root)
# The host FUSE mount at /mnt/immich-external-library is shared to containers
# via bind mount — no mount propagation tricks needed.

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-v2}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      immich-microservices:
        condition: service_healthy
      immich-ml-balancer:
        condition: service_healthy
    environment:
      DB_HOSTNAME: postgres
      DB_USERNAME: ${DB_USERNAME:-immich}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME:-immich}
      DB_PORT: 5432
      REDIS_HOSTNAME: redis
      IMMICH_WORKERS_INCLUDE: api
    volumes:
      - upload_data:/usr/src/app/upload
      - type: bind
        source: /mnt/immich-external-library
        target: /mnt/external-library
        read_only: true
        bind:
          propagation: rslave
    networks:
      - immich-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2283/api/server/ping"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s

  immich-microservices:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-v2}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOSTNAME: postgres
      DB_USERNAME: ${DB_USERNAME:-immich}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME:-immich}
      DB_PORT: 5432
      REDIS_HOSTNAME: redis
      IMMICH_WORKERS_INCLUDE: microservices
    volumes:
      - upload_data:/usr/src/app/upload
      - type: bind
        source: /mnt/immich-external-library
        target: /mnt/external-library
        read_only: true
        bind:
          propagation: rslave
    networks:
      - immich-net
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 1
      start_period: 30s

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-v2}
    restart: unless-stopped
    environment:
      DB_HOSTNAME: postgres
      DB_USERNAME: ${DB_USERNAME:-immich}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME:-immich}
      DB_PORT: 5432
      REDIS_HOSTNAME: redis
      IMMICH_WORKERS_INCLUDE: machinelearning
    volumes:
      - upload_data:/usr/src/app/upload
      - ml_cache:/cache
    networks:
      - immich-net
    deploy:
      resources:
        limits:
          memory: 2G

  immich-ml-balancer:
    image: docker.io/library/nginx:1.27-alpine
    restart: unless-stopped
    environment:
      ML_LB_METHOD: ${ML_LB_METHOD:-round_robin}
      ML_LB_KEEPALIVE: ${ML_LB_KEEPALIVE:-32}
      ML_BACKEND_MAX_FAILS: ${ML_BACKEND_MAX_FAILS:-2}
      ML_BACKEND_FAIL_TIMEOUT: ${ML_BACKEND_FAIL_TIMEOUT:-10s}
      ML_PROXY_CONNECT_TIMEOUT: ${ML_PROXY_CONNECT_TIMEOUT:-3s}
      ML_PROXY_SEND_TIMEOUT: ${ML_PROXY_SEND_TIMEOUT:-300s}
      ML_PROXY_READ_TIMEOUT: ${ML_PROXY_READ_TIMEOUT:-300s}
      ML_PROXY_NEXT_UPSTREAM_TRIES: ${ML_PROXY_NEXT_UPSTREAM_TRIES:-3}
      ML_BACKEND_1: ${ML_BACKEND_1:-immich-machine-learning:3003}
      ML_BACKEND_1_WEIGHT: ${ML_BACKEND_1_WEIGHT:-1}
      ML_BACKEND_2: ${ML_BACKEND_2:-}
      ML_BACKEND_2_WEIGHT: ${ML_BACKEND_2_WEIGHT:-1}
      ML_BACKEND_3: ${ML_BACKEND_3:-}
      ML_BACKEND_3_WEIGHT: ${ML_BACKEND_3_WEIGHT:-1}
      ML_BACKEND_4: ${ML_BACKEND_4:-}
      ML_BACKEND_4_WEIGHT: ${ML_BACKEND_4_WEIGHT:-1}
      ML_BACKEND_5: ${ML_BACKEND_5:-}
      ML_BACKEND_5_WEIGHT: ${ML_BACKEND_5_WEIGHT:-1}
      ML_BACKEND_6: ${ML_BACKEND_6:-}
      ML_BACKEND_6_WEIGHT: ${ML_BACKEND_6_WEIGHT:-1}
      ML_BACKEND_7: ${ML_BACKEND_7:-}
      ML_BACKEND_7_WEIGHT: ${ML_BACKEND_7_WEIGHT:-1}
      ML_BACKEND_8: ${ML_BACKEND_8:-}
      ML_BACKEND_8_WEIGHT: ${ML_BACKEND_8_WEIGHT:-1}
      ML_BACKEND_9: ${ML_BACKEND_9:-}
      ML_BACKEND_9_WEIGHT: ${ML_BACKEND_9_WEIGHT:-1}
      ML_BACKEND_10: ${ML_BACKEND_10:-}
      ML_BACKEND_10_WEIGHT: ${ML_BACKEND_10_WEIGHT:-1}
    volumes:
      - ./immich-ml-balancer/nginx.conf.template:/etc/nginx/balancer.conf.template:ro
      - ./immich-ml-balancer/render-nginx.sh:/docker-entrypoint.d/30-render-nginx.sh:ro
    networks:
      - immich-net
    healthcheck:
      test: ["CMD-SHELL", "ps -o comm= 1 | grep -q nginx && nginx -t >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME:-immich}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - immich-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-immich} -d ${DB_DATABASE_NAME:-immich}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: docker.io/valkey/valkey:9@sha256:3eeb09785cd61ec8e3be35f8804c8892080f3ca21934d628abc24ee4ed1698f6
    restart: unless-stopped
    command: valkey-server --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    networks:
      - immich-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  immich-net:
    driver: bridge

volumes:
  upload_data:
  ml_cache:
  postgres_data:
  redis_data:
