name: immich

services:
  immich-server:
    build:
      context: .
      dockerfile: Dockerfile.immich
      args:
        RCLONE_REPO: ${RCLONE_REPO:-https://github.com/thies2005/rclone.git}
        RCLONE_BRANCH: ${RCLONE_BRANCH:-master}
        IMMICH_VERSION: ${IMMICH_VERSION:-v2}
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    security_opt:
      - apparmor:unconfined
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/immich-entrypoint.sh"]
    environment:
      INTERNXT_REMOTE_NAME: ${INTERNXT_REMOTE_NAME:-MyInternxt}
      INTERNXT_EMAIL: ${INTERNXT_EMAIL}
      INTERNXT_PASSWORD: ${INTERNXT_PASSWORD}
      INTERNXT_TOTP_SECRET: ${INTERNXT_TOTP_SECRET}
      RCLONE_MOUNT_TARGET: ${RCLONE_MOUNT_TARGET:-/mnt/external-library}
      RCLONE_CACHE_DIR: ${RCLONE_CACHE_DIR:-/cache/vfs}
      RCLONE_VFS_CACHE_MAX_SIZE: ${RCLONE_VFS_CACHE_MAX_SIZE:-8G}
      RCLONE_VFS_CACHE_MAX_AGE: ${RCLONE_VFS_CACHE_MAX_AGE:-48h}
      RCLONE_BUFFER_SIZE: ${RCLONE_BUFFER_SIZE:-64M}
      RCLONE_READ_AHEAD: ${RCLONE_READ_AHEAD:-128M}
      RCLONE_VFS_CACHE_POLL_INTERVAL: ${RCLONE_VFS_CACHE_POLL_INTERVAL:-30s}
      RCLONE_DIR_CACHE_TIME: ${RCLONE_DIR_CACHE_TIME:-5m}
      RCLONE_TRANSFERS: ${RCLONE_TRANSFERS:-2}
      RCLONE_CHECKERS: ${RCLONE_CHECKERS:-4}
      RCLONE_RETRIES: ${RCLONE_RETRIES:-5}
      RCLONE_LOW_LEVEL_RETRIES: ${RCLONE_LOW_LEVEL_RETRIES:-10}
      RCLONE_TIMEOUT: ${RCLONE_TIMEOUT:-120s}
      RCLONE_CONTIMEOUT: ${RCLONE_CONTIMEOUT:-30s}
      DB_HOSTNAME: postgres
      DB_USERNAME: ${DB_USERNAME:-immich}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME:-immich}
      DB_PORT: 5432
      REDIS_HOSTNAME: redis
      IMMICH_WORKERS_INCLUDE: api
    volumes:
      - upload_data:/usr/src/app/upload
      - rclone_cache_server:/cache/vfs
      - rclone_config:/config/rclone
    networks:
      - immich-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2283/api/server/ping"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 180s

  immich-microservices:
    build:
      context: .
      dockerfile: Dockerfile.immich
      args:
        RCLONE_REPO: ${RCLONE_REPO:-https://github.com/thies2005/rclone.git}
        RCLONE_BRANCH: ${RCLONE_BRANCH:-master}
        IMMICH_VERSION: ${IMMICH_VERSION:-v2}
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    security_opt:
      - apparmor:unconfined
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/immich-entrypoint.sh"]
    environment:
      INTERNXT_REMOTE_NAME: ${INTERNXT_REMOTE_NAME:-MyInternxt}
      INTERNXT_EMAIL: ${INTERNXT_EMAIL}
      INTERNXT_PASSWORD: ${INTERNXT_PASSWORD}
      INTERNXT_TOTP_SECRET: ${INTERNXT_TOTP_SECRET}
      RCLONE_MOUNT_TARGET: ${RCLONE_MOUNT_TARGET:-/mnt/external-library}
      RCLONE_CACHE_DIR: ${RCLONE_CACHE_DIR:-/cache/vfs}
      RCLONE_VFS_CACHE_MAX_SIZE: ${RCLONE_VFS_CACHE_MAX_SIZE:-8G}
      RCLONE_VFS_CACHE_MAX_AGE: ${RCLONE_VFS_CACHE_MAX_AGE:-48h}
      RCLONE_BUFFER_SIZE: ${RCLONE_BUFFER_SIZE:-64M}
      RCLONE_READ_AHEAD: ${RCLONE_READ_AHEAD:-128M}
      RCLONE_VFS_CACHE_POLL_INTERVAL: ${RCLONE_VFS_CACHE_POLL_INTERVAL:-30s}
      RCLONE_DIR_CACHE_TIME: ${RCLONE_DIR_CACHE_TIME:-5m}
      RCLONE_TRANSFERS: ${RCLONE_TRANSFERS:-2}
      RCLONE_CHECKERS: ${RCLONE_CHECKERS:-4}
      RCLONE_RETRIES: ${RCLONE_RETRIES:-5}
      RCLONE_LOW_LEVEL_RETRIES: ${RCLONE_LOW_LEVEL_RETRIES:-10}
      RCLONE_TIMEOUT: ${RCLONE_TIMEOUT:-120s}
      RCLONE_CONTIMEOUT: ${RCLONE_CONTIMEOUT:-30s}
      DB_HOSTNAME: postgres
      DB_USERNAME: ${DB_USERNAME:-immich}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME:-immich}
      DB_PORT: 5432
      REDIS_HOSTNAME: redis
      IMMICH_WORKERS_INCLUDE: microservices
    volumes:
      - upload_data:/usr/src/app/upload
      - rclone_cache_microservices:/cache/vfs
      - rclone_config:/config/rclone
    networks:
      - immich-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2283/api/server/ping"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 180s

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-v2}
    restart: unless-stopped
    environment:
      DB_HOSTNAME: postgres
      DB_USERNAME: ${DB_USERNAME:-immich}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME:-immich}
      DB_PORT: 5432
      REDIS_HOSTNAME: redis
      IMMICH_WORKERS_INCLUDE: machinelearning
    volumes:
      - upload_data:/usr/src/app/upload
      - ml_cache:/cache
    networks:
      - immich-net
    deploy:
      resources:
        limits:
          memory: 2G

  postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME:-immich}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - immich-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-immich} -d ${DB_DATABASE_NAME:-immich}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: docker.io/valkey/valkey:9@sha256:3eeb09785cd61ec8e3be35f8804c8892080f3ca21934d628abc24ee4ed1698f6
    restart: unless-stopped
    command: valkey-server --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    networks:
      - immich-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  immich-net:
    driver: bridge

volumes:
  rclone_config:
  rclone_cache_server:
  rclone_cache_microservices:
  upload_data:
  ml_cache:
  postgres_data:
  redis_data:
